<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, {{ fondo|default:"#4C758A" }} 0%, #F2F2F2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        /* Animated background elements */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 80%;
            left: 20%;
            animation-delay: 4s;
        }

        .circle:nth-child(4) {
            width: 60px;
            height: 60px;
            top: 30%;
            left: 70%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
                opacity: 0.6;
            }
        }

        /* 404 Number */
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Icon */
        .error-icon {
            font-size: 8rem;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }

        /* Text */
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.95;
            line-height: 1.6;
        }

        /* Button */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: white;
            color: {{ fondo|default:"#4C758A" }};
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
            background: #f8f9ff;
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        /* Additional links */
        .additional-links {
            margin-top: 30px;
        }

        .link {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            margin: 0 15px;
            opacity: 0.9;
            transition: opacity 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .link:hover {
            opacity: 1;
            border-bottom-color: white;
        }

        /* Card style alternative */
        .error-card {
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin: 0 auto;
        }

        .error-card .error-code {
            background: linear-gradient(135deg, {{ fondo|default:"#4C758A" }} 0%, #F2F2F2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-card .error-title {
            color: #333;
            text-shadow: none;
        }

        .error-card .error-message {
            color: #666;
        }

        /* Countdown timer */
        .countdown {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 7rem;
            }

            .error-icon {
                font-size: 6rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .btn-home {
                padding: 16px 35px;
                font-size: 1rem;
            }

            .additional-links {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .link {
                margin: 0;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }

            .error-icon {
                font-size: 4rem;
            }

            .error-title {
                font-size: 1.6rem;
            }

            .error-message {
                font-size: 0.95rem;
            }

            .error-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Main content -->
    <div class="container">
        <!-- Error icon -->
        <div class="error-icon">🔍</div>
        
        <!-- 404 code -->
        <div class="error-code">404</div>
        
        <!-- Title -->
        <h1 class="error-title">¡Página No Encontrada!</h1>
        
        <!-- Message -->
        <p class="error-message">
            Lo sentimos, la página que buscas no existe o ha sido movida. 
            <br>
            Verifica la URL o regresa al inicio.
        </p>
        
        <!-- Home button -->
        <a href="{% url 'cuentas:mostrarperfil' %}" class="btn-home">
            <span>🏠</span>
            Volver al Inicio
        </a>

        <!-- Countdown (optional) -->
        <div class="countdown" id="countdown"></div>
    </div>
</body>
</html>
